# rag-lab = Flex Consumption → NO usar Azure/functions-action (Kudu settings 503).
# Deploy: zip precompilado + POST /api/publish?RemoteBuild=false
#
# Secret: AZURE_FUNCTIONAPP_PUBLISH_PROFILE (XML completo)
# Opcional: AZURE_FUNCTIONAPP_HOSTNAME (smoke test post-deploy)

name: Build and deploy Node.js project to Azure Function App

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Un solo deploy por rama; evita cancelar el run del push al disparar workflow_dispatch a la vez.
concurrency:
  group: azure-functions-${{ github.ref }}
  cancel-in-progress: false

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: "."
  NODE_VERSION: "22.x"

jobs:
  build-and-deploy:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies and build
        shell: pwsh
        run: |
          pushd './${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}'
          npm install
          npm install typescript -D
          npm run build --if-present
          popd

      - name: Create deployment package
        shell: pwsh
        id: package
        run: |
          $zip = & ./scripts/azure/build-deploy-zip.ps1
          "zip_path=$zip" >> $env:GITHUB_OUTPUT

      - name: Deploy to Flex Consumption (api/publish)
        shell: pwsh
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          EXPECTED_HOST: ${{ secrets.AZURE_FUNCTIONAPP_HOSTNAME }}
        run: |
          if (-not $env:PUBLISH_PROFILE) { throw "Falta secret AZURE_FUNCTIONAPP_PUBLISH_PROFILE" }
          $profilePath = Join-Path $env:RUNNER_TEMP 'publish-profile.xml'
          [System.IO.File]::WriteAllText($profilePath, $env:PUBLISH_PROFILE, [System.Text.UTF8Encoding]::new($false))
          [xml]$doc = Get-Content -Raw -Encoding UTF8 $profilePath
          $prof = $doc.publishData.publishProfile | Where-Object { $_.publishMethod -eq 'ZipDeploy' } | Select-Object -First 1
          $scmHost = ($prof.publishUrl -split ':')[0]
          Write-Host "SCM host from publish profile: $scmHost"
          if ($scmHost -match 'func-lab-langgraph') {
            throw "Publish profile apunta a func-lab-langgraph (SCM 503). Ejecuta scripts/github/set-azure-deploy-secrets.ps1 para rag-lab."
          }
          if ($env:EXPECTED_HOST -and $scmHost -notmatch [regex]::Escape($env:EXPECTED_HOST.Split('.')[0])) {
            Write-Host "WARN: SCM host no coincide con AZURE_FUNCTIONAPP_HOSTNAME=$($env:EXPECTED_HOST)"
          }
          & ./scripts/azure/publish-flex-package.ps1 `
            -ZipPath '${{ steps.package.outputs.zip_path }}' `
            -PublishProfilePath $profilePath

      - name: Smoke test (openapi)
        continue-on-error: true
        shell: pwsh
        env:
          SMOKE_HOST: ${{ secrets.AZURE_FUNCTIONAPP_HOSTNAME }}
        run: |
          $fnHost = if ($env:SMOKE_HOST) { $env:SMOKE_HOST.Trim() } else { "" }
          if (-not $fnHost) { Write-Host "Skip smoke test (sin AZURE_FUNCTIONAPP_HOSTNAME)"; exit 0 }
          $url = "https://$fnHost/api/openapi.json"
          Write-Host "GET $url"
          for ($i = 1; $i -le 12; $i++) {
            try {
              $r = Invoke-WebRequest -Uri $url -UseBasicParsing -TimeoutSec 90
              if ($r.StatusCode -eq 200) { Write-Host "OK openapi.json ($($r.Content.Length) bytes)"; exit 0 }
            } catch {
              Write-Host "Attempt $i/12: $($_.Exception.Message)"
            }
            Start-Sleep -Seconds 15
          }
          Write-Host "::warning::Smoke test failed (cold start?); deploy ya aceptado con 202."
          exit 1
