# Docs: https://github.com/Azure/functions-action
#
# rag-lab (Flex): scripts/azure/publish-flex-package.ps1 → /api/publish?RemoteBuild=false
#   (evita zipdeploy + 502 en SCM). Repo variable FLEX_CONSUMPTION=false para plan clásico.
#
# func-lab-langgraph (clásico): Azure/functions-action@v1.5.0 como ayudascp-ia.
#
# Secrets: AZURE_FUNCTIONAPP_PUBLISH_PROFILE
# Opcional: variable FLEX_CONSUMPTION = false | true (default true)

name: Build and deploy Node.js project to Azure Function App

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: "."
  NODE_VERSION: "22.x"

jobs:
  build-and-deploy:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: "Checkout GitHub Action"
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }} Environment
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: "Install dependencies"
        shell: pwsh
        run: |
          pushd './${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}'
          npm install
          npm install typescript -D
          npm run build --if-present
          npm prune --omit=dev
          popd

      - name: "Create deployment package"
        shell: pwsh
        id: package
        run: |
          $zip = & ./scripts/azure/build-deploy-zip.ps1
          "zip_path=$zip" >> $env:GITHUB_OUTPUT

      - name: "Deploy (Flex Consumption — api/publish)"
        if: ${{ vars.FLEX_CONSUMPTION != 'false' }}
        shell: pwsh
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
        run: |
          $profilePath = Join-Path $env:RUNNER_TEMP 'publish-profile.xml'
          [System.IO.File]::WriteAllText($profilePath, $env:PUBLISH_PROFILE, [System.Text.UTF8Encoding]::new($false))
          & ./scripts/azure/publish-flex-package.ps1 `
            -ZipPath '${{ steps.package.outputs.zip_path }}' `
            -PublishProfilePath $profilePath

      - name: "Deploy (classic — ayudascp-ia)"
        if: ${{ vars.FLEX_CONSUMPTION == 'false' }}
        uses: Azure/functions-action@v1.5.0
        with:
          app-name: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          respect-funcignore: true
