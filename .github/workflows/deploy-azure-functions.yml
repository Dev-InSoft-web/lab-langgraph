# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/functions-action
# More GitHub Actions for Azure: https://github.com/Azure/actions
#
# Mismo flujo que ayudascp-ia: publish-profile → functions-action empaqueta y despliega
# (Zip Deploy vía la action; no script manual a Kudu/SCM).
#
# Secrets: AZURE_FUNCTIONAPP_PUBLISH_PROFILE (XML del perfil de publicación)

name: Build and deploy Node.js project to Azure Function App - rag-lab

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: "."
  NODE_VERSION: "22.x"

jobs:
  build-and-deploy:
    runs-on: windows-latest
    steps:
      - name: "Checkout GitHub Action"
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }} Environment
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: "Install dependencies"
        shell: pwsh
        run: |
          pushd './${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}'
          npm install
          npm install typescript -D
          npm run build --if-present
          popd

      - name: "Deploy to Azure Function App"
        uses: Azure/functions-action@v1.5.0
        with:
          app-name: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
