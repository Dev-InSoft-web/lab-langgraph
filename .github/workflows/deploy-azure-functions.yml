# Despliega lab-langgraph en Azure Functions en cada push a main.
# Secretos (Settings → Secrets → Actions):
#   AZURE_FUNCTIONAPP_NAME
#   AZURE_FUNCTIONAPP_PUBLISH_PROFILE  — XML completo (scripts/azure/fetch-publish-profile.ps1)

name: Deploy lab-langgraph (Azure Functions)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: azure-functions-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
          package: .
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          scm-do-build-during-deployment: false
          respect-funcignore: true

      - name: Health check
        if: success()
        run: |
          BASE="https://${{ secrets.AZURE_FUNCTIONAPP_NAME }}.azurewebsites.net"
          for i in 1 2 3 4 5; do
            if curl -fsS "${BASE}/api/health"; then exit 0; fi
            echo "Retry $i..."
            sleep 15
          done
          exit 1
