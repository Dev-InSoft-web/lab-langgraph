# Despliega lab-langgraph en Azure Functions en cada push a main.
# Secretos en el repo (Settings → Secrets → Actions):
#   AZURE_FUNCTIONAPP_NAME          — ej. func-insoft-lablanggraph
#   AZURE_FUNCTIONAPP_PUBLISH_PROFILE — XML del perfil de publicación (portal o provision.ps1)

name: Deploy lab-langgraph (Azure Functions)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: azure-functions-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        id: deploy
        with:
          app-name: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
          package: .
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}

      - name: Health check
        if: success()
        run: |
          BASE="https://${{ secrets.AZURE_FUNCTIONAPP_NAME }}.azurewebsites.net"
          curl -fsS "${BASE}/api/health" | head -c 2000
          echo ""
