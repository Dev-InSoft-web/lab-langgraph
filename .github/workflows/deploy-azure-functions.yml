# Deploy lab-langgraph → Azure Functions Flex Consumption (Linux, Node 22)
#
# Secrets (repo → Settings → Secrets → Actions):
#   AZURE_FUNCTIONAPP_NAME              = rag-lab
#   AZURE_FUNCTIONAPP_HOSTNAME          = rag-lab-....azurewebsites.net (scripts/github/set-azure-deploy-secrets.ps1)
#   AZURE_FUNCTIONAPP_PUBLISH_PROFILE   = XML completo del perfil de publicación
#
# Flex Consumption: usar Azure/functions-action con sku flexconsumption (no zip deploy directo a Kudu).

name: Deploy lab-langgraph (Azure Functions)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: azure-functions-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Stage deployment package
        run: |
          mkdir -p deploy_pkg
          cp host.json package.json package-lock.json deploy_pkg/
          cp -r dist node_modules deploy_pkg/

      - name: Deploy to Azure Functions (Flex Consumption)
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
          package: deploy_pkg
          sku: flexconsumption
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}

      - name: Health check
        env:
          APP_HOST: ${{ secrets.AZURE_FUNCTIONAPP_HOSTNAME }}
        run: |
          if [ -z "$APP_HOST" ]; then
            echo "AZURE_FUNCTIONAPP_HOSTNAME not set; skipping health check."
            exit 0
          fi
          BASE="https://${APP_HOST}"
          for i in 1 2 3 4 5 6 8 10; do
            echo "Health attempt (wait ${i}s)..."
            sleep "$i"
            if curl -fsS "${BASE}/api/health"; then
              echo ""
              exit 0
            fi
          done
          echo "Health check failed — app may still be warming up; check Azure Portal."
          exit 1
