<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>lab-langgraph · static</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" crossorigin />
  <link rel="stylesheet" href="comun/css/main.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.26.9/babel.min.js" crossorigin></script>
  <script src="https://unpkg.com/@mui/material@5.16.7/umd/material-ui.production.min.js" crossorigin></script>
  <script src="https://cdn.jsdelivr.net/npm/@microsoft/signalr@8/dist/browser/signalr.min.js" crossorigin></script>
  <script src="config.js"></script>
  <script src="signalr-lab.js"></script>
  <script src="comun/js/urlState.js"></script>
  <script src="comun/js/auth.js"></script>
  <script src="comun/js/api.js"></script>
  <script src="comun/js/session.js"></script>
  <script src="comun/js/sse.js"></script>
  <script src="comun/js/labFetch.js"></script>
  <script src="comun/js/conversationApi.js"></script>
</head>
<body>
  <div id="root"></div>
  <script>
    (async function () {
      const files = [
        "comun/jsx/00-mui-setup.js",
        "comun/jsx/auth/AuthDialog.js",
        "comun/jsx/auth/AuthContext.js",
        "comun/jsx/layouts/LabPage.js",
        "comun/jsx/layouts/LabShell.js",
        "comun/jsx/pages/FitDocsPage.js",
        "comun/jsx/pages/ConversationPage.js",
        "comun/jsx/pages/DiagramsPage.js",
        "comun/jsx/App.js",
        "index.js",
      ];
      for (const file of files) {
        const res = await fetch(file);
        if (!res.ok) throw new Error("No se pudo cargar " + file);
        const code = await res.text();
        const out = Babel.transform(code, { presets: ["react"] }).code;
        (0, eval)(out);
      }
    })().catch(function (err) {
      console.error(err);
      document.getElementById("root").innerHTML =
        '<pre style="color:#f66;padding:1rem">Error cargando front: ' + err.message + "</pre>";
    });
  </script>
</body>
</html>
